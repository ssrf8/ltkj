<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #1f2933;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      .panel {
        background: #fff;
        border: 1px solid #dde3ea;
        border-radius: 8px;
        box-shadow: 0 14px 40px rgba(31, 41, 51, 0.08);
        padding: 28px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 22px;
        line-height: 1.3;
      }

      .hint {
        margin: 0 0 24px;
        color: #64748b;
        font-size: 14px;
      }

      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 650;
        font-size: 13px;
      }

      input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        padding: 11px 12px;
        font: inherit;
        color: #1f2933;
        background: #fff;
      }

      .row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
      }

      button {
        margin-top: 22px;
        min-height: 42px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .status {
        margin-top: 18px;
        border-radius: 6px;
        padding: 12px;
        background: #f1f5f9;
        color: #334155;
        white-space: pre-wrap;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      .error {
        background: #fff1f2;
        color: #9f1239;
      }

      .success {
        background: #ecfdf5;
        color: #065f46;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      @media (max-width: 560px) {
        main {
          padding: 24px 0;
        }

        .panel {
          padding: 20px;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>登录</h1>
        <p class="hint">提交后写入本地登录状态，并返回工作台。</p>

        <form id="form">
          <div class="row">
            <div>
              <label for="mobileAreaCode">区号</label>
              <input id="mobileAreaCode" name="mobileAreaCode" value="86" autocomplete="tel-country-code" />
            </div>
            <div>
              <label for="account">手机号</label>
              <input id="account" name="account" autocomplete="username" />
            </div>
          </div>

          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" />

          <div class="actions">
            <button id="submit" type="submit">登录</button>
            <button id="go" type="button">进入工作台</button>
          </div>
        </form>

        <div id="status" class="status">等待提交。</div>
      </section>
    </main>

    <script>
      const DASHBOARD_PATH = "/aiad/batch/dashboard";
      const form = document.getElementById("form");
      const submit = document.getElementById("submit");
      const statusBox = document.getElementById("status");
      const go = document.getElementById("go");

      function setStatus(message, type) {
        statusBox.textContent = message;
        statusBox.className = "status" + (type ? ` ${type}` : "");
      }

      go.addEventListener("click", () => {
        location.href = DASHBOARD_PATH;
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submit.disabled = true;
        setStatus("正在登录...", "");

        const payload = Object.fromEntries(new FormData(form).entries());

        try {
          const response = await fetch("/__auth/login/password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const data = await response.json();

          if (!data.ok) {
            setStatus(data.message || JSON.stringify(data, null, 2), "error");
            return;
          }

          localStorage.setItem("token", JSON.stringify(data.token));
          setStatus("登录状态已写入，即将进入工作台。", "success");
          location.href = DASHBOARD_PATH;
        } catch (error) {
          setStatus(error.stack || error.message || String(error), "error");
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
