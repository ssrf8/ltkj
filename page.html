    <script>
      (function () {
        var batchPrefix = '/aiad/batch';
        var dashboardPath = '/aiad/batch/dashboard';

        if (location.pathname === '/' || location.pathname === '') {
          location.replace(dashboardPath);
          return;
        }

        if (location.pathname.indexOf('/aiad') !== 0) {
          location.replace(dashboardPath);
          return;
        }

        if (location.pathname === batchPrefix || location.pathname === batchPrefix + '/') {
          location.replace(dashboardPath);
          return;
        }

        if (location.pathname.indexOf('/aiad') === 0 && location.pathname.indexOf(batchPrefix) !== 0) {
          location.replace(dashboardPath);
          return;
        }

        if (location.pathname.indexOf(batchPrefix) === 0 && !localStorage.getItem('token')) {
          location.replace('/login?redirect=' + encodeURIComponent(location.pathname + location.search + location.hash));
        }
      })();
    </script>
