    <script>
      (function () {
        var publicEntryPath = '__PUBLIC_ENTRY_PATH__';
        var internalRoot = '/' + 'ai' + 'ad';
        var internalBatchPrefix = internalRoot + '/batch';
        var internalDashboardPath = internalBatchPrefix + '/dashboard';
        var rawPushState = history.pushState.bind(history);
        var rawReplaceState = history.replaceState.bind(history);

        function pathWithSuffix(pathname) {
          return pathname + location.search + location.hash;
        }

        function toInternalPath(pathname) {
          if (pathname === publicEntryPath || pathname === publicEntryPath + '/') {
            return internalDashboardPath;
          }

          if (pathname.indexOf(publicEntryPath + '/') === 0) {
            return internalBatchPrefix + pathname.slice(publicEntryPath.length);
          }

          return pathname;
        }

        window.__PUBLIC_ROUTE_TO_INTERNAL__ = function (pathname, search, hash, base) {
          var internalPath = toInternalPath(pathname);
          if (internalPath === pathname) {
            return '';
          }

          if (base && internalPath.toLowerCase().indexOf(base.toLowerCase()) === 0) {
            internalPath = internalPath.slice(base.length) || '/';
          }

          return internalPath + search + hash;
        };

        function toPublicUrl(url) {
          if (!url) {
            return url;
          }

          var parsed = new URL(url, location.origin);
          if (parsed.origin !== location.origin) {
            return url;
          }

          if (parsed.pathname === internalDashboardPath || parsed.pathname === internalBatchPrefix || parsed.pathname === internalBatchPrefix + '/') {
            return publicEntryPath + parsed.search + parsed.hash;
          }

          if (parsed.pathname.indexOf(internalBatchPrefix + '/') === 0) {
            return publicEntryPath + parsed.pathname.slice(internalBatchPrefix.length) + parsed.search + parsed.hash;
          }

          if (parsed.pathname.indexOf(internalRoot) === 0) {
            return publicEntryPath + parsed.search + parsed.hash;
          }

          return parsed.pathname + parsed.search + parsed.hash;
        }

        function installPublicHistoryMask() {
          if (window.__PUBLIC_HISTORY_MASK_INSTALLED__) {
            rawReplaceState(history.state, '', toPublicUrl(location.href));
            return;
          }

          window.__PUBLIC_HISTORY_MASK_INSTALLED__ = true;
          history.pushState = function (state, title, url) {
            return rawPushState(state, title, toPublicUrl(url));
          };

          history.replaceState = function (state, title, url) {
            return rawReplaceState(state, title, toPublicUrl(url));
          };

          rawReplaceState(history.state, '', toPublicUrl(location.href));
        }

        if (location.pathname === '/' || location.pathname === '') {
          location.replace(publicEntryPath);
          return;
        }

        if (location.pathname.indexOf(internalRoot) === 0) {
          location.replace(publicEntryPath);
          return;
        }

        if (location.pathname.indexOf(publicEntryPath) !== 0) {
          location.replace(publicEntryPath);
          return;
        }

        if (!localStorage.getItem('token')) {
          location.replace('/login?redirect=' + encodeURIComponent(pathWithSuffix(location.pathname)));
          return;
        }

        installPublicHistoryMask();
      })();
    </script>
